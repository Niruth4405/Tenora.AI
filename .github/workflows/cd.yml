name: CD

on:
  workflow_run:
    workflows: ["CI"]           # Must match the name: field in ci.yml exactly
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    # Only deploy if CI workflow succeeded — not if it failed or was cancelled
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: "mongodb://localhost:27017/tenora_ci"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment & project info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test — verify deployment is live
        run: |
          echo "Deployed to: ${{ steps.deploy.outputs.deployment_url }}"
          curl --fail --retry 3 --retry-delay 5 \
            ${{ steps.deploy.outputs.deployment_url }}