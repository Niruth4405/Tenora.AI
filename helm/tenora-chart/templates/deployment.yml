# helm/tenora-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenora-app
  namespace: {{ .Values.namespace }}
  labels:
    app: tenora-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: tenora-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: tenora-app
    spec:
      containers:
      - name: tenora-app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        envFrom:
        - secretRef:
            name: {{ .Values.secretName }}
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
        readinessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/health
            port: {{ .Values.service.targetPort }}
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3